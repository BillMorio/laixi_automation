<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Laixi WS Handshake Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #111; color: #eee; }
    #status { padding: 8px; margin-bottom: 12px; border-radius: 4px; }
    .ok    { background: #163; }
    .err   { background: #611; }
    .wait  { background: #444; }
    pre    { background: #000; padding: 12px; border-radius: 4px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Laixi WebSocket Handshake Test</h2>
  <div id="status" class="wait">Connecting to ws://127.0.0.1:22221/ ...</div>
  <pre id="log"></pre>

  <script>
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const log = (msg) => { logEl.textContent += msg + "\n"; };

    const ws = new WebSocket("ws://127.0.0.1:22221/");

    ws.onopen = () => {
      statusEl.textContent = "Connected. Sending { action: 'List' } ...";
      statusEl.className = "ok";
      log("[open] socket connected");
      ws.send(JSON.stringify({ action: "List" }));
    };

    ws.onmessage = (event) => {
      statusEl.textContent = "Handshake OK — response received.";
      statusEl.className = "ok";
      log("[message] " + event.data);
    };

    ws.onerror = (e) => {
      statusEl.textContent = "WebSocket error (is Laixi running on 127.0.0.1:22221?)";
      statusEl.className = "err";
      log("[error] " + (e.message || "see browser console"));
    };

    ws.onclose = (e) => {
      log("[close] code=" + e.code + " reason=" + (e.reason || "(none)"));
    };
  </script>
</body>
</html>
